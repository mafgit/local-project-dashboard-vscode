<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Document</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <h1>Local Project Opener</h1>

    <main class="project-sections-container">
      <section class="projects-section">
        <p>/abc/def/codes</p>
        <div class="projects">
          <div class="project">
            <div class="project-head">
              <div class="project-head-heading">
                <img src="folder-solid-full.svg" width="20" alt="folder" />
                <h3>OCR Technology</h3>
              </div>

              <div class="project-btns">
                <button class="project-edit-btn">
                  <img src="pencil-solid-full.svg" alt="edit" />
                </button>
                <button class="project-star-btn">
                  <img src="star-solid-full.svg" alt="star" />
                </button>
              </div>
            </div>
            <div class="languages">
              <div class="language">
                <div class="language-icon"></div>
                <p>60% ts</p>
              </div>

              <div class="language">
                <div class="language-icon"></div>
                <p>60% ts</p>
              </div>

              <div class="language">
                <div class="language-icon"></div>
                <p>60% ts</p>
              </div>
            </div>

            <div class="project-bottom">
              <button class="open-btn">Open</button>
            </div>
          </div>
        </div>
      </section>
    </main>
    <script src="script.js"></script>
  </body>
</html>
